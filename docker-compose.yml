services:
  db:
    image: postgres:16-alpine
    container_name: campusride-db
    restart: always
    environment:
      POSTGRES_USER: campusride
      POSTGRES_PASSWORD: campusride_password
      POSTGRES_DB: campusride_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusride -d campusride_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusride-backend
    restart: always
    command: sh -c "npx prisma db push && npm start"
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://campusride:campusride_password@db:5432/campusride_db?schema=public
      JWT_ACCESS_SECRET: dev_access_secret_replace_in_production_super_long
      JWT_REFRESH_SECRET: dev_refresh_secret_replace_in_production_super_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 1000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campusride-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL=http://192.168.29.197:4001/api/v1
      NEXT_PUBLIC_SOCKET_URL=http://192.168.29.197:4001
    depends_on:
      - backend

volumes:
  pgdata:
